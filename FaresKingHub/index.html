    <style>
        @import url('https://fonts.googleapis.com/css2?family=Fira+Code:wght@400;700&display=swap');

        body {
            background-color: #000;
            color: #00ff00; /* Toxic Green */
            font-family: 'Fira+Code', monospace;
            overflow: hidden;
            margin: 0;
        }

        #matrix-canvas {
            position: fixed;
            top: 0;
            left: 0;
            z-index: 1;
            opacity: 0.4;
        }

        #bouncing-container {
            position: fixed;
            top: 0;
            left: 0;
            width: 100vw;
            height: 100vh;
            z-index: 0;
            pointer-events: none;
        }

        .bouncing-text {
            position: absolute;
            color: rgba(0, 255, 0, 0.15);
            font-weight: 900;
            white-space: nowrap;
            font-size: 1.5rem;
            text-transform: uppercase;
        }

        .glow-wrap {
            position: relative;
            z-index: 10;
        }

        .glow-wrap::before {
            content: '';
            position: absolute;
            top: -5px;
            left: -5px;
            right: -5px;
            bottom: -5px;
            background: linear-gradient(45deg, #00ff00, #004400, #00ff00, #000);
            background-size: 400%;
            z-index: -1;
            filter: blur(20px);
            border-radius: 20px;
            animation: steam 15s linear infinite;
        }

        @keyframes steam {
            0% { background-position: 0 0; }
            50% { background-position: 400% 0; }
            100% { background-position: 0 0; }
        }

        .hacker-card {
            background: rgba(0, 5, 0, 0.98);
            border: 1px solid #00ff00;
            backdrop-filter: blur(20px);
            box-shadow: inset 0 0 20px rgba(0, 255, 0, 0.2);
        }

        .glitch-text {
            color: #fff;
            text-shadow: 3px 0 #00ff00, -3px 0 #004400;
            animation: glitch 1.5s infinite linear alternate-reverse;
        }

        @keyframes glitch {
            0% { transform: translate(1px, 1px); }
            50% { transform: translate(-1.5px, -0.5px); text-shadow: -3px 0 #00ff00; }
            100% { transform: translate(0, 0); }
        }

        .btn-devil {
            background: linear-gradient(45deg, #004400, #00ff00);
            color: black;
            font-weight: 900;
            transition: all 0.2s ease;
            border: 1px solid rgba(255,255,255,0.4);
        }

        .btn-devil:hover {
            box-shadow: 0 0 40px #00ff00;
            transform: scale(1.05);
            filter: brightness(1.3);
        }

        #copy-gui {
            position: fixed;
            top: -120px;
            left: 50%;
            transform: translateX(-50%);
            background: #00ff00;
            color: #000;
            padding: 20px 50px;
            border-radius: 0 0 20px 20px;
            font-weight: 900;
            z-index: 100;
            display: flex;
            align-items: center;
            gap: 20px;
            box-shadow: 0 10px 50px rgba(0, 255, 0, 0.8);
            transition: top 0.4s cubic-bezier(0.18, 0.89, 0.32, 1.28);
        }

        #copy-gui.show { top: 0; }

        .scroll-custom::-webkit-scrollbar { width: 4px; }
        .scroll-custom::-webkit-scrollbar-thumb { background: #00ff00; }

        .devil-svg {
            filter: drop-shadow(0 0 10px #00ff00);
            animation: float 3s ease-in-out infinite;
        }

        @keyframes float {
            0%, 100% { transform: translateY(0) rotate(0deg); }
            50% { transform: translateY(-10px) rotate(5deg); }
        }

        .toxic-shadow {
            filter: drop-shadow(0 0 15px rgba(0, 255, 0, 0.8));
        }
    </style>
</head>
<body class="flex items-center justify-center min-h-screen">

                        <path d="M15 12c.5 0 1-.5 1-1s-.5-1-1-1-1 .5-1 1 .5 1 1 1z"/>
                        <path d="M8 20v2h8v-2"/>

                    </svg>
                </div>
            </div>

            <div class="mb-8 bg-black/80 p-5 rounded-lg border-l-8 border-green-500 text-xs text-green-100 relative overflow-hidden">
                <p class="font-black text-green-500 mb-2 underline tracking-widest text-lg uppercase">Override Instructions:</p>
                <p class="mb-1 flex items-center gap-2"><i class="fa-solid fa-chevron-right text-[8px]"></i> HIT THE BUTTON BELOW 😈</p>
                <p class="mb-1 flex items-center gap-2"><i class="fa-solid fa-chevron-right text-[8px]"></i> TAB INTO YOUR QUIZ 😈</p>

            <div class="mb-8 group relative">
                <div class="absolute -top-2 left-4 bg-green-500 text-black text-[8px] px-2 font-bold uppercase">Live Payload</div>

[ INITIALIZING DEVILISH BYPASS... ]
                </pre>

            <div class="flex flex-col gap-4">

                    Subscribe to Fares King 😈
                </a>
            </div>
        </div>
    </div>

    <script>
        const canvas = document.getElementById('matrix-canvas');
        const ctx = canvas.getContext('2d');
        function resize() {
            canvas.width = window.innerWidth;
            canvas.height = window.innerHeight;
        }
        window.addEventListener('resize', resize);
        resize();

        const chars = "😈💀🔥666LOCKEDIN01";
        const drops = Array(Math.floor(canvas.width / 20)).fill(1);
        function draw() {
            ctx.fillStyle = "rgba(0, 0, 0, 0.1)";
            ctx.fillRect(0, 0, canvas.width, canvas.height);
            ctx.fillStyle = "#0f0";
            ctx.font = "20px monospace";
            drops.forEach((yPos, i) => {
                const text = chars[Math.floor(Math.random() * chars.length)];
                ctx.fillText(text, i * 20, yPos * 20);
                if (yPos * 20 > canvas.height && Math.random() > 0.98) drops[i] = 0;
                drops[i]++;
            });
        }
        setInterval(draw, 50);

        (function() {
            const bouncer = document.getElementById('bouncer');
            let posX = Math.random() * (window.innerWidth - 200);
            let posY = Math.random() * (window.innerHeight - 30);
            let speedX = 2;
            let speedY = 2;

            function animateBouncer() {
                posX += speedX;
                posY += speedY;
                if (posX + bouncer.clientWidth >= window.innerWidth || posX <= 0) speedX = -speedX;
                if (posY + bouncer.clientHeight >= window.innerHeight || posY <= 0) speedY = -speedY;
                bouncer.style.left = posX + 'px';
                bouncer.style.top = posY + 'px';
                requestAnimationFrame(animateBouncer);
            }
            animateBouncer();
        })();

        // FIXED URL: Removed hyphen from username and encoded space as %20
        const GIST_URL = "https://gist.githubusercontent.com/FaresKingYT/abe71fb1ba41e98451aba8a2ba77deca/raw/Fares%20King%20Solver.js";
        let fetchedCode = "";

        async function loadCode() {
            const preview = document.getElementById('code-preview');
            preview.textContent = "[ ATTEMPTING SECURE CONNECTION... ]";
            
            try {
                // Fetch with cache-busting timestamp
                const response = await fetch(`${GIST_URL}?t=${Date.now()}`);
                
                if (!response.ok) {
                    throw new Error(`HTTP Error: ${response.status}`);
                }
                
                fetchedCode = await response.text();
                preview.textContent = fetchedCode;
                console.log("Fares King Hub: Payload injected successfully.");
            } catch (error) {
                console.error("Fares King Hub Error:", error);
                preview.textContent = "404 ERROR: GIST NOT FOUND. 😈\n\nFix Steps:\n1. Open your Gist on GitHub.\n2. Click 'Raw'.\n3. Copy that exact URL into the script.";
                fetchedCode = "";
            }
        }
        
        loadCode();

        document.getElementById('copy-btn').onclick = () => {
            if (!fetchedCode) {
                loadCode();
                return;
            }
            const el = document.createElement("textarea");
            el.value = fetchedCode;
            document.body.appendChild(el);
            el.select();
            document.execCommand('copy');
            document.body.removeChild(el);
            const gui = document.getElementById('copy-gui');
            gui.classList.add('show');
            setTimeout(() => gui.classList.remove('show'), 3000);
        };
    </script>
